services:
  qq-farm-bot:
    # 基于仓库根目录 Dockerfile 本地构建镜像
    build: .
    container_name: qq-farm-bot
    restart: unless-stopped
    ports:
      # 端口映射：宿主机端口:容器端口
      - "3000:3000"
    volumes:
      # 持久化运行数据（SQLite 数据库与运行状态）
      - ./data:/app/data
    environment:
      # 应用运行时参数
      - PORT=3000
      - TZ=Asia/Shanghai
      # 安全项：生产环境请替换为自定义 32 字符密钥
      - BOT_ENCRYPT_KEY=qq-farm-bot-default-key-32bytes!
      # 可选 SMTP 配置（启用邮件通知时，取消注释并填写真实值）
      # - MAIL_HOST=smtp.qq.com
      # - MAIL_PORT=587
      # - MAIL_USER=你的邮箱@qq.com
      # - MAIL_PASS=你的SMTP授权码
